<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-src 'self';">
    <title>AI-OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="desktop">
        <div class="icon" data-app="keyboard">
            <div class="icon-img">⌨️</div>
            <div class="icon-label">Keyboard</div>
        </div>
        <div class="icon" data-app="terminal">
            <div class="icon-img">🐚</div>
            <div class="icon-label">Terminal</div>
        </div>
        <div class="icon" data-app="news">
            <div class="icon-img">📰</div>
            <div class="icon-label">News</div>
        </div>
        <div class="icon" data-app="iaas">
            <div class="icon-img">🏢</div>
            <div class="icon-label">IaaS</div>
        </div>
        <div class="icon" data-app="paas">
            <div class="icon-img">🛠️</div>
            <div class="icon-label">PaaS</div>
        </div>
        <div class="icon" data-app="saas">
            <div class="icon-img">☁️</div>
            <div class="icon-label">SaaS</div>
        </div>
        <div class="icon" data-app="itsaas">
            <div class="icon-img">🎧</div>
            <div class="icon-label">ITsaas</div>
        </div>
        <div class="icon" data-app="simulation">
            <div class="icon-img">🧪</div>
            <div class="icon-label">Simulation</div>
        </div>
    </div>

    <div id="taskbar">
        <div id="start-button">🚀</div>
        <div id="running-apps"></div>
        <div id="clock"></div>
    </div>

    <div id="window-container"></div>

    <script src="script.js"></script>
</body>
</html>
