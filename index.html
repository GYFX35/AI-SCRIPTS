<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https://images.unsplash.com; connect-src 'self';">
    <title>AI-OS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="shell">
    <div id="desktop">
        <div class="icon" data-app="keyboard">
            <div class="icon-img">⌨️</div>
            <div class="icon-label">Keyboard</div>
        </div>
        <div class="icon" data-app="terminal">
            <div class="icon-img">🐚</div>
            <div class="icon-label">Terminal</div>
        </div>
        <div class="icon" data-app="news">
            <div class="icon-img">📰</div>
            <div class="icon-label">News</div>
        </div>
    </div>

    <div id="taskbar">
        <div id="start-button">🚀</div>
        <div id="running-apps"></div>
        <div id="clock"></div>
    </div>

    <div id="window-container"></div>

    <script src="script.js"></script>
</body>
</html>
