<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Hub</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; }
        .app-card { border: 1px solid #ddd; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; transition: 0.2s; }
        .app-card:hover { border-color: #2196F3; background: #f0f7ff; }
        .app-icon { font-size: 2em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>Software (SaaS)</h1>
    <div class="grid">
        <div class="app-card">
            <div class="app-icon">🤖</div>
            <div>AI Writer</div>
        </div>
        <div class="app-card">
            <div class="app-icon">🎨</div>
            <div>AI Designer</div>
        </div>
        <div class="app-card">
            <div class="app-icon">📊</div>
            <div>Data Insights</div>
        </div>
        <div class="app-card">
            <div class="app-icon">💬</div>
            <div>Chat Bot</div>
        </div>
    </div>
</body>
</html>
