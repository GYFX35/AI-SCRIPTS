<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITsaas Support</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fafafa; }
        .ticket { background: white; padding: 15px; border-left: 4px solid #2196F3; margin-bottom: 10px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .urgent { border-left-color: #f44336; }
        .meta { font-size: 0.85em; color: #777; margin-top: 5px; }
    </style>
</head>
<body>
    <h1>IT Service (ITsaas)</h1>
    <h3>Open Tickets</h3>
    <div class="ticket urgent">
        <strong>Cannot access email server</strong>
        <div class="meta">Assigned to: Support Team | Priority: High</div>
    </div>
    <div class="ticket">
        <strong>Software update request</strong>
        <div class="meta">Assigned to: IT Admin | Priority: Medium</div>
    </div>
    <div class="ticket">
        <strong>New employee onboarding</strong>
        <div class="meta">Assigned to: HR/IT | Priority: Low</div>
    </div>
</body>
</html>
